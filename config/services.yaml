parameters:
    base_uri_hubspot: 'https://api.hubapi.com'
    hubspot_access: '%env(HUBSPOT_ACCESS_TOKEN)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'